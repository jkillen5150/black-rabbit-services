<!--
  Drop-in block for blackrabbitlawn.com (BlackRabbitApp2026).
  Keep the marketing site as-is; this only points visitors at the marketplace app.

  1. Set BR_APP_URL to your hosted app (Codespace, Railway, app.blackrabbitlawn.com, …)
  2. Paste this section after the hero or below the existing service form
  3. Optional: replace the form entirely with the iframe once you trust the embed
-->

<style>
  .br-marketplace {
    max-width: 720px;
    margin: 32px auto 48px;
    padding: 0 20px;
  }
  .br-marketplace-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.1);
    padding: 36px 28px;
    text-align: center;
  }
  .br-marketplace-card h2 {
    margin: 0 0 10px;
    color: #2e5a2e;
    font-size: 1.75rem;
  }
  .br-marketplace-card p {
    margin: 0 0 22px;
    color: #555;
    line-height: 1.5;
  }
  .br-cta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
  }
  .br-cta {
    display: inline-block;
    background: #2e5a2e;
    color: #fff !important;
    text-decoration: none;
    font-weight: 700;
    padding: 14px 18px;
    border-radius: 12px;
    min-width: 140px;
  }
  .br-cta.secondary {
    background: #fff;
    color: #2e5a2e !important;
    border: 2px solid #2e5a2e;
  }
  .br-embed-wrap {
    margin-top: 28px;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #e5e0d6;
    background: #f8f5f0;
  }
  .br-embed-wrap iframe {
    width: 100%;
    min-height: 720px;
    border: 0;
    display: block;
    background: #fff;
  }
  .br-embed-toggle {
    margin-top: 18px;
    background: transparent;
    border: none;
    color: #2e5a2e;
    font-weight: 700;
    cursor: pointer;
    text-decoration: underline;
    font-size: 0.95rem;
  }
</style>

<section class="br-marketplace" id="marketplace" aria-label="Black Rabbit marketplace">
  <div class="br-marketplace-card">
    <h2>Free local job board</h2>
    <p>
      Post a lawn job, browse pros, or ask Grok — powered by Black Rabbit Services.
      Same company, new open marketplace. No rebuild of this page required.
    </p>

    <div class="br-cta-row">
      <a class="br-cta" data-br-path="/" href="#">Post a free job</a>
      <a class="br-cta secondary" data-br-path="/pros" href="#">Find a pro</a>
      <a class="br-cta secondary" data-br-path="/chat" href="#">Ask Grok</a>
    </div>

    <button type="button" class="br-embed-toggle" id="br-embed-toggle">
      Or open the app right here ↓
    </button>

    <div class="br-embed-wrap" id="br-embed-wrap" hidden>
      <iframe
        id="br-app-frame"
        title="Black Rabbit Services"
        loading="lazy"
        allow="clipboard-write"
        referrerpolicy="no-referrer-when-downgrade"
      ></iframe>
    </div>
  </div>
</section>

<script>
  (function () {
    // >>> CHANGE THIS when you deploy the marketplace app <<<
    // Examples:
    //   https://zany-doodle-7v495j96jw7r3wr9r-8081.app.github.dev
    //   https://app.blackrabbitlawn.com
    var BR_APP_URL = window.BR_APP_URL || 'https://app.blackrabbitlawn.com';

    function join(base, path) {
      return String(base).replace(/\/$/, '') + path;
    }

    document.querySelectorAll('[data-br-path]').forEach(function (a) {
      a.href = join(BR_APP_URL, a.getAttribute('data-br-path') || '/');
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
    });

    var toggle = document.getElementById('br-embed-toggle');
    var wrap = document.getElementById('br-embed-wrap');
    var frame = document.getElementById('br-app-frame');
    var loaded = false;

    if (toggle && wrap && frame) {
      toggle.addEventListener('click', function () {
        var open = wrap.hasAttribute('hidden');
        if (open) {
          if (!loaded) {
            frame.src = join(BR_APP_URL, '/');
            loaded = true;
          }
          wrap.removeAttribute('hidden');
          toggle.textContent = 'Hide embedded app ↑';
        } else {
          wrap.setAttribute('hidden', '');
          toggle.textContent = 'Or open the app right here ↓';
        }
      });
    }
  })();
</script>
